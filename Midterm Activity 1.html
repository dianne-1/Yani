<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nested Lists</title>
    <style>
        body {
            font-family: "Times New Roman", serif;
            margin: 60px;
        }

        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .square-bullets {
            list-style-type: square;
        }
    </style>
</head>
<body>

    <h1>LISTS</h1>

    <ol type="A">
        <li>Main Topic 1</li>
        <li>
            Main Topic 2
            <ol type="I">
                <li>Topic 1</li>
                <li>
                    Topic 2
                    <ul class="square-bullets">
                        <li>Subtopic 1</li>
                        <li>Subtopic 2</li>
                    </ul>
                </li>
                <li>
                    Topic 3
                    <ol type="i">
                        <li>Subtopic 1</li>
                        <li>
                            Subtopic 2
                            <ul>
                                <li>Mini Topic 1</li>
                                <li>Mini Topic 2</li>
                            </ul>
                        </li>
                        <li>Subtopic 3</li>
                    </ol>
                </li>
            </ol>
        </li>
        <li>Main Topic 3</li>
    </ol>

</body>
</html>
