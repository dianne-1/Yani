    <title>Blender Collection | Gallery</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gallery {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px; 
            margin: 20px auto;
            max-width: 900px; 
        }

        .gallery-item {
            flex: 0 0 45%; 
            background: #111;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            color: white;
            box-sizing: border-box;
        }

            .gallery-item img {
                width: 100%;
                height: auto;
                border-radius: 5px;
                transition: transform 0.3s, border-color 0.3s;
                border: 2px solid #444;
            }

                .gallery-item img:hover {
                    transform: scale(1.05);
                    border-color: red;
                }

            .gallery-item p {
                margin: 10px 0 5px;
                font-weight: bold;
            }

            .gallery-item strong {
                color: red;
            }

        .btn {
            display: inline-block;
            margin: 30px auto;
            padding: 12px 25px;
            background: red;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

            .btn:hover {
                background: darkred;
            }

        @media (max-width: 600px) {
            .gallery-item {
                flex: 0 0 90%;
            }
        }
    </style>
</head>
